<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>MAKI-LOG — 薪シェアアプリ</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#4B5320" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="./assets/icon.png" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />

<style>
:root {
  --bg: #0F0F0D; --olive: #4B5320; --gold: #C5A059; --text: #E2DDD0;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; overflow: hidden; }

#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
#leaflet-map { flex: 1; width: 100%; background: #111; }

/* 🛠 バナーのスタイル（修正済み） */
#install-toast {
  position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 16px; right: 16px;
  z-index: 9999; background: #171714; border: 1px solid var(--gold);
  border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  transform: translateY(200%); transition: transform 0.5s ease-out;
}
#install-toast.show { transform: translateY(0); }
.toast-text { flex: 1; font-size: 13px; line-height: 1.4; }
.toast-btn { background: var(--olive); color: white; border: 1px solid var(--gold); padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; }
.toast-close { color: #888; font-size: 24px; cursor: pointer; padding: 4px; line-height: 1; }

/* タブバー */
#tab-bar { display: flex; background: #000; border-top: 1px solid #2e2d27; padding-bottom: var(--safe-bottom); }
.tab-item { flex: 1; padding: 15px; text-align: center; font-size: 10px; color: #5c574f; font-family: 'Courier Prime', monospace; }
.tab-item.active { color: var(--gold); }
</style>
</head>

<body>
<div id="app">
  <div id="leaflet-map"></div>
  <div id="tab-bar">
    <div class="tab-item active">MAP</div>
    <div class="tab-item">POST</div>
    <div class="tab-item">LOG</div>
  </div>
</div>

<div id="install-toast" id="pwa-banner">
  <div class="toast-text">🔥 <strong>MAKI-LOG</strong> をホーム画面に追加してアプリとして使おう！</div>
  <button id="install-btn" class="toast-btn">追加</button>
  <div id="close-pwa-banner" class="toast-close">×</div>
</div>

<script>
  // 1. マップ初期化（八尾市周辺をデフォルトに）
  const map = L.map('leaflet-map', { zoomControl: false }).setView([34.626, 135.599], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // 2. バナー制御ロジック
  const toast = document.getElementById('install-toast');
  const closeBtn = document.getElementById('close-pwa-banner');
  const installBtn = document.getElementById('install-btn');

  // 表示判定：閉じた履歴がなければ3秒後に出す
  window.addEventListener('load', () => {
    if (!localStorage.getItem('maki_banner_closed')) {
      setTimeout(() => toast.classList.add('show'), 3000);
    }
  });

  // ×ボタンで閉じる（履歴を保存して二度と出さない）
  closeBtn.addEventListener('click', () => {
    toast.classList.remove('show');
    localStorage.setItem('maki_banner_closed', 'true');
  });

  // インストール処理
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
  });

  installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') localStorage.setItem('maki_banner_closed', 'true');
      deferredPrompt = null;

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>MAKI-LOG — 薪シェアアプリ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root { --bg: #0F0F0D; --olive: #4B5320; --gold: #C5A059; --text: #E2DDD0; --card-bg: #171714; --safe-bottom: env(safe-area-inset-bottom, 0px); }
body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100dvh; }
.page { display: none; flex: 1; flex-direction: column; overflow-y: auto; padding-bottom: 80px; }
.page.active { display: flex; }
#leaflet-map { height: 350px; width: 100%; flex-shrink: 0; }
.card-container { padding: 16px; display: flex; gap: 12px; overflow-x: auto; }
.spot-card { background: var(--card-bg); border: 1px solid #2e2d27; border-radius: 12px; min-width: 200px; padding: 12px; position: relative; }
.sample-badge { font-size: 9px; color: #888; border: 1px solid #444; padding: 2px 4px; border-radius: 4px; position: absolute; top: 10px; right: 10px; }
.profile-section { padding: 30px 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
#drop-zone { width: 90px; height: 90px; border-radius: 50%; border: 2px dashed var(--gold); overflow: hidden; background: #222; cursor: pointer; }
#drop-zone img { width: 100%; height: 100%; object-fit: cover; }
input { width: 100%; background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; margin-bottom: 10px; }
#install-banner { position: fixed; bottom: calc(70px + var(--safe-bottom)); left: 10px; right: 10px; z-index: 10000; background: var(--card-bg); border: 1px solid var(--gold); border-radius: 10px; padding: 12px; display: flex; align-items: center; gap: 10px; transform: translateY(200%); transition: transform 0.4s; }
#install-banner.show { transform: translateY(0); }
#tab-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #000; border-top: 1px solid #2e2d27; padding-bottom: var(--safe-bottom); }
.tab-item { flex: 1; padding: 12px; text-align: center; font-size: 9px; color: #5c574f; font-family: 'Courier Prime'; cursor: pointer; }
.tab-item.active { color: var(--gold); }
</style>
</head>
<body>
<div id="app">
  <div id="page-map" class="page active">
    <div id="leaflet-map"></div>
    <div style="font-size:11px; color:var(--gold); text-align:center; padding:5px;">📍 地図をタップして場所を指定</div>
    <div class="card-container">
      <div class="spot-card"><span class="sample-badge">SAMPLE</span><div style="color:var(--gold)">直売所</div><strong>杉山製材所</strong><br><small>¥500 / 束</small></div>
      <div class="spot-card"><span class="sample-badge">SAMPLE</span><div style="color:var(--gold)">キャンプ場</div><strong>富士見キャンプ場</strong><br><small>¥600 / 束</small></div>
    </div>
  </div>
  <div id="page-post" class="page"><div style="padding:20px; text-align:center;"><span class="sample-badge">SAMPLE</span><h2>POST (投稿)</h2><p>ここに薪の情報を入力するフォームがきます</p></div></div>
  <div id="page-rescue" class="page"><div style="padding:20px; text-align:center;"><span class="sample-badge">SAMPLE</span><h2>RESCUE (レスキュー)</h2><p>薪が足りないキャンパーの依頼が表示されます</p></div></div>
  <div id="page-my" class="page">
    <div class="profile-section">
      <h2 style="font-family:'Courier Prime'">MY PAGE</h2>
      <div id="drop-zone"><img id="profile-img" src="https://via.placeholder.com/100"><input type="file" id="file-input" hidden accept="image/*"></div>
      <input type="text" id="user-name" placeholder="ニックネーム">
      <input type="text" id="camp-years" placeholder="キャンプ歴 (例: 2年)">
      <button onclick="alert('保存しました')" style="background:var(--olive); color:white; border:none; padding:10px 30px; border-radius:20px;">保存</button>
    </div>
  </div>
  <div id="tab-bar">
    <div class="tab-item active" onclick="switchPage('map')">MAP</div>
    <div class="tab-item" onclick="switchPage('post')">POST</div>
    <div class="tab-item" onclick="switchPage('rescue')">RESCUE</div>
    <div class="tab-item" onclick="switchPage('my')">MY PAGE</div>
  </div>
</div>
<div id="install-banner">
  <div style="flex:1; font-size:12px;">📲 <strong>MAKI-LOG</strong> を追加！</div>
  <button id="install-btn" style="background:var(--olive); color:white; border:1px solid var(--gold); padding:5px 10px; border-radius:5px;">追加</button>
  <div id="close-banner" style="font-size:20px; cursor:pointer;">×</div>
</div>
<script>
  const map = L.map('leaflet-map', { zoomControl: false }).setView([34.626, 135.599], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  map.on('click', e => { alert("地点登録: " + e.latlng.lat.toFixed(4)); });
  function switchPage(pId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + pId).classList.add('active');
    event.currentTarget.classList.add('active');
    if(pId === 'map') setTimeout(() => map.invalidateSize(), 200);
  }
  const banner = document.getElementById('install-banner');
  window.addEventListener('load', () => { if (!localStorage.getItem('maki_hide_bn')) setTimeout(() => banner.classList.add('show'), 2000); });
  document.getElementById('close-banner').onclick = () => { banner.classList.remove('show'); localStorage.setItem('maki_hide_bn', 'true'); };
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  dropZone.onclick = () => fileInput.click();
  fileInput.onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => document.getElementById('profile-img').src = ev.target.result;
    reader.readAsDataURL(e.target.files[0]);
  };
</script>
</body>
</html>
